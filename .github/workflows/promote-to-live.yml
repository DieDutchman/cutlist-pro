name: 🚀 Promote DEV → LIVE

# Manually triggered from the GitHub Actions tab.
# Copies dev.html → index.html, commits, and pushes.
# GitHub Pages then serves index.html as the live site automatically.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type PROMOTE to go live'
        required: true
        default: ''

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "PROMOTE" ]; then
            echo "❌ Type PROMOTE in the input box to confirm."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy dev.html → index.html
        run: |
          if [ ! -f "dev.html" ]; then
            echo "❌ dev.html not found"
            exit 1
          fi
          cp dev.html index.html
          echo "✓ Copied dev.html → index.html"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "ℹ No changes — index.html already matches dev.html"
          else
            git commit -m "🚀 Promote dev → live [$(date '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo ""
            echo "✅ LIVE — will update in ~30 seconds:"
            echo "   https://diedutchman.github.io/cutlist-pro/"
          fi
