name: 🚀 Promote DEV → LIVE

# This workflow ONLY runs when you manually trigger it from the GitHub Actions tab.
# It copies dev.html → index.html and deploys the live site.
# The live site is NOT touched until you explicitly run this.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type PROMOTE to confirm you want to go live'
        required: true
        default: ''

permissions:
  contents: write      # needed to commit index.html
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false   # don't cancel — this is a deliberate release

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "PROMOTE" ]; then
            echo "❌ Confirmation not received. Type PROMOTE in the input box."
            exit 1
          fi
          echo "✓ Confirmed — promoting dev.html to live"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy dev.html → index.html
        run: |
          if [ ! -f "dev.html" ]; then
            echo "❌ dev.html not found in repo root"
            exit 1
          fi
          cp dev.html index.html
          echo "✓ dev.html → index.html"

      - name: Commit and push index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "ℹ index.html is already identical to dev.html — nothing to commit"
          else
            TIMESTAMP=$(date '+%Y-%m-%d %H:%M UTC')
            git commit -m "🚀 Promote dev.html → index.html [$TIMESTAMP]"
            git push
            echo "✓ index.html committed and pushed"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Done
        run: |
          echo ""
          echo "✅ LIVE SITE UPDATED"
          echo "   https://diedutchman.github.io/cutlist-pro/"
          echo ""
          echo "   dev.html is still available for next round of changes."
