name: 🔧 Deploy DEV (Staging)

on:
  push:
    branches:
      - main
    paths:
      - 'dev.html'

jobs:
  confirm:
    runs-on: ubuntu-latest
    steps:
      - name: Staging ready
        run: |
          echo "✅ dev.html pushed successfully."
          echo ""
          echo "🔧 Staging: https://diedutchman.github.io/cutlist-pro/dev.html"
          echo "🌐 Live site unchanged: https://diedutchman.github.io/cutlist-pro/"
          echo ""
          echo "When happy → Actions → 🚀 Promote DEV → LIVE → type PROMOTE"
