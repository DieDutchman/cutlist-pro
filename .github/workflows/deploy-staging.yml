name: 🔧 Deploy DEV (Staging)

on:
  push:
    branches:
      - main
    paths:
      - 'dev.html'

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Stamp DEV timestamp
        run: |
          STAMP="DEV $(date -u '+%Y-%m-%d %H:%M UTC')"
          sed -i "s|BUILD_TIMESTAMP|${STAMP}|g" dev.html
          echo "✓ Stamped: ${STAMP}"

      - name: Commit stamped dev.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dev.html
          if git diff --cached --quiet; then
            echo "ℹ No timestamp change"
          else
            git commit -m "🔧 Stamp DEV build timestamp"
            git push
          fi
          echo ""
          echo "🔧 Staging: https://diedutchman.github.io/cutlist-pro/dev.html"
          echo "🌐 Live site unchanged: https://diedutchman.github.io/cutlist-pro/"
          echo ""
          echo "When happy → Actions → 🚀 Promote DEV → LIVE → type PROMOTE"
