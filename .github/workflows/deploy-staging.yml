name: 🔧 Deploy DEV (Staging)

# Runs automatically whenever dev.html is uploaded/committed.
# Staging URL: https://diedutchman.github.io/cutlist-pro/dev.html

on:
  push:
    branches:
      - main
    paths:
      - 'dev.html'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-dev"
  cancel-in-progress: true

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Print URLs
        run: |
          echo ""
          echo "🔧 STAGING: https://diedutchman.github.io/cutlist-pro/dev.html"
          echo "🌐 LIVE:    https://diedutchman.github.io/cutlist-pro/"
          echo ""
          echo "When ready to go live, run the '🚀 Promote DEV → LIVE' workflow."
