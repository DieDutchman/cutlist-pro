name: 🔧 Deploy DEV (Staging)

# Triggers when dev.html is uploaded to the repo.
# GitHub Pages serves the whole repo — so dev.html is immediately
# available at: https://diedutchman.github.io/cutlist-pro/dev.html
# No action needed — Pages serves whatever is committed to the branch.

on:
  push:
    branches:
      - main
    paths:
      - 'dev.html'

jobs:
  confirm:
    runs-on: ubuntu-latest
    steps:
      - name: Staging URL
        run: |
          echo "✅ dev.html uploaded successfully."
          echo ""
          echo "🔧 Test it here (may take 30s to refresh):"
          echo "   https://diedutchman.github.io/cutlist-pro/dev.html"
          echo ""
          echo "🌐 Live site unchanged:"
          echo "   https://diedutchman.github.io/cutlist-pro/"
          echo ""
          echo "When happy, run '🚀 Promote DEV → LIVE' from the Actions tab."
